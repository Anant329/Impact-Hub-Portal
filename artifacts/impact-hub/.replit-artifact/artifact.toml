kind = "web"
previewPath = "/"
title = "Impact Hub"
version = "1.0.0"
id = "artifacts/impact-hub"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 20524
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/impact-hub run dev"

[services.env]
PORT = "20524"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/impact-hub", "run", "build"]
publicDir = "artifacts/impact-hub/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
